name: Scrape Jobs

on:
  schedule:
    # Every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger scrape
        run: |
          URL="${{ secrets.NEXT_PUBLIC_APP_URL }}"
          if [ -z "$URL" ]; then
            echo "::error::NEXT_PUBLIC_APP_URL secret is not set"
            exit 1
          fi
          RESPONSE=$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.SCRAPE_SECRET }}" \
            "$URL/api/scrape")
          echo "$RESPONSE" | head -c 500
          echo ""
          echo "$RESPONSE" | grep -q '"ok":true' || { echo "::error::Scrape returned error"; exit 1; }
